# AgentPM Slack App Manifest
#
# 使い方: https://api.slack.com/apps → Create New App → From an app manifest
# → ワークスペースを選択 → このYAMLを貼り付け → Create
#
# 作成後にやること:
#   1. Basic Information → App Credentials の Client ID / Client Secret /
#      Signing Secret を .env.local の SLACK_CLIENT_ID / SLACK_CLIENT_SECRET /
#      SLACK_SIGNING_SECRET に設定（SLACK_STATE_SECRET は openssl rand -hex 32 で生成）
#   2. 下記 agentpm.app を実際の公開ドメインに置換してから貼り付けること。
#      ローカル開発で Events / Interactivity / Slash Command を試す場合は
#      ngrok 等の公開URLが必要（OAuth redirect のみ http://localhost:4000 でも可）
#
# 実装との対応（変更時はコードも要修正）:
#   - OAuth callback:      src/app/api/slack/callback/route.ts
#   - スラッシュコマンド:   src/app/api/slack/commands/route.ts
#   - インタラクション:     src/app/api/slack/interactions/route.ts
#   - イベント(app_mention): src/app/api/slack/webhook/route.ts

display_information:
  name: AgentPM
  description: プロジェクトのタスク・承認をSlackから確認できるAgentPM連携
  background_color: "#f59e0b"

features:
  bot_user:
    display_name: AgentPM
    always_online: true
  slash_commands:
    - command: /agentpm
      url: https://agentpm.app/api/slack/commands
      description: タスクの確認・作成
      usage_hint: "help | status | task <タイトル>"
      should_escape: false

oauth_config:
  redirect_urls:
    - https://agentpm.app/api/slack/callback
    - http://localhost:4000/api/slack/callback
  scopes:
    bot:
      - chat:write
      - channels:read
      - groups:read
      - app_mentions:read

settings:
  event_subscriptions:
    request_url: https://agentpm.app/api/slack/webhook
    bot_events:
      - app_mention
  interactivity:
    is_enabled: true
    request_url: https://agentpm.app/api/slack/interactions
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
